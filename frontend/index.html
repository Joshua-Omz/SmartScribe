<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartScribe — Voice-to-Text</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 2rem;
      color: #2b6cb0;
    }

    header p {
      color: #718096;
      margin-top: 0.4rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      padding: 2rem;
      width: 100%;
      max-width: 560px;
    }

    .controls {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    button {
      flex: 1;
      padding: 0.75rem 1rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #startBtn  { background: #38a169; color: #fff; }
    #stopBtn   { background: #e53e3e; color: #fff; }

    .status {
      font-size: 0.875rem;
      color: #718096;
      margin-bottom: 1.5rem;
      min-height: 1.25rem;
    }

    .status.recording { color: #e53e3e; font-weight: 600; }

    .result-box {
      background: #edf2f7;
      border-radius: 8px;
      padding: 1rem;
      min-height: 4rem;
    }

    .result-box h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #718096;
      margin-bottom: 0.5rem;
    }

    #transcriptionText {
      font-size: 1rem;
      color: #2d3748;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <header>
    <h1>🎙️ SmartScribe</h1>
    <p>Healthcare voice-to-text for clinical notes</p>
  </header>

  <main class="card">
    <div class="controls">
      <button id="startBtn">▶ Start Recording</button>
      <button id="stopBtn" disabled>⏹ Stop Recording</button>
    </div>

    <p class="status" id="status" role="status" aria-live="polite">Ready — press Start Recording to begin.</p>

    <div class="result-box">
      <h2>Transcription</h2>
      <p id="transcriptionText">Your transcription will appear here.</p>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
