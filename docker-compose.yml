version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartscribe-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartscribe-backend
    ports:
      - "8082:8080"
    environment:
      - GOOGLE_STT_API_KEY=${GOOGLE_STT_API_KEY}
      - LLM_API_KEY=${LLM_API_KEY}
    env_file:
      - ./backend/.env
